<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OP-1 DU'A TRACKER</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="scanlines"></div>

    <div id="loginScreen" class="dashboard-container" style="text-align: center; max-width: 400px;">
        <h1 class="glow-text glitch-hover" data-text="SYSTEM ACCESS" style="margin-bottom: 2rem;">SYSTEM ACCESS</h1>
        <p style="color: #888; margin-bottom: 1rem;">Enter your access token to continue.</p>
        <input type="text" id="tokenInput" class="neon-input" placeholder="Enter Token..." style="width: 100%; margin-bottom: 1rem; text-align: center;">
        <button class="secondary-btn" style="width: 100%;" onclick="verifyToken()">AUTHENTICATE</button>
        <p id="loginError" style="color: #ff3333; margin-top: 1rem; display: none;">ACCESS DENIED</p>
    </div>

    <div id="dashboard" class="dashboard-container" style="display: none;">
        <header>
            <h1 class="glow-text glitch-hover" data-text="OP-1 TRACKER">OP-1 TRACKER</h1>
        </header>

        <div class="media-center">
            <button id="weatherBtn" class="small-btn" style="width: 100%; border-color: #555; color: #888; margin-bottom: 15px;" onclick="toggleWeather()">🌧️ AMBIENT STORM: OFF</button>
            <audio id="weatherAudio" loop crossorigin="anonymous" src="https://actions.google.com/sounds/v1/weather/thunderstorm.ogg"></audio>

            <span class="label">LIVE RECITATION STREAM</span>
            <select id="reciterSelect" class="neon-input" style="width: 100%; margin-bottom: 10px;" onchange="changeAudio()">
                <option value="https://qurango.net/radio/mishary_alafasi">Mishary Rashid Alafasy</option>
                <option value="https://qurango.net/radio/abdulbasit_abdulsamad_mojawwad">Abdul Basit</option>
                <option value="https://qurango.net/radio/yasser_aldosari">Yasser Al-Dosari</option>
                <option value="https://qurango.net/radio/maher_al_muaiqly">Maher Al Muaiqly</option>
            </select>
            <audio id="quranAudio" controls crossorigin="anonymous"></audio>
        </div>

        <div class="stats-grid">
            <div class="stat-box" style="position: relative;">
                <span class="label">TARGET</span>
                <span class="value" id="targetDisplay">1,000,000</span>
                <button onclick="editTarget()" style="background: none; border: none; color: #888; cursor: pointer; position: absolute; top: 10px; right: 10px;">✎</button>
            </div>
            <div class="stat-box glow-box" style="position: relative;">
                <span class="label">GRAND TOTAL</span>
                <span class="value dynamic-text" id="grandTotal">0</span>
                <button onclick="resetTotal()" style="background: none; border: none; color: #ff3333; cursor: pointer; position: absolute; top: 10px; right: 10px; font-size: 1.2rem; font-weight: bold;" title="Reset Total">⟲</button>
            </div>
            <div class="stat-box">
                <span class="label">LEFT TO GO</span>
                <span class="value" id="leftToGo">1,000,000</span>
            </div>
        </div>

        <div class="speedometer-container">
            <svg viewBox="0 0 200 110" class="speedometer">
                <path class="speed-bg" d="M 10 100 A 90 90 0 0 1 190 100" fill="none" stroke-width="12" stroke-linecap="round"/>
                <path id="speedFill" class="speed-fill" d="M 10 100 A 90 90 0 0 1 190 100" fill="none" stroke-width="12" stroke-dasharray="283" stroke-dashoffset="283" stroke-linecap="round"/>
            </svg>
        </div>

        <div class="main-controls">
            <div class="daily-stat">
                <span class="label">SESSION COUNT</span>
                <span class="value dynamic-text" id="dailyCount" style="font-size: 2rem;">0</span>
            </div>
            
            <div style="display: flex; gap: 10px;">
                <input type="number" id="manualInput" class="neon-input" placeholder="Bulk Add...">
                <button class="small-btn" onclick="addManual()">ADD</button>
            </div>
            
            <button class="main-btn" id="reciteBtn" onclick="recite(event)">
                <span class="btn-text">+1</span>
            </button>

            <div style="display: flex; gap: 10px;">
                <button class="secondary-btn" onclick="saveSession()">END DAY & SAVE</button>
                <button class="secondary-btn" style="border-color: #555; color: #aaa;" onclick="downloadCSV()">CSV BACKUP</button>
            </div>
        </div>

        <div class="terminal">
            <div class="terminal-header">SESSION_HISTORY.LOG</div>
            <ul id="historyLog"></ul>
        </div>

        <div style="text-align: center; margin-top: 2rem; border-top: 1px solid #333; padding-top: 1rem;">
            <p style="color: #555; font-size: 0.8rem;">TOKEN: <span id="currentUserDisplay" class="dynamic-text"></span></p>
            <button class="secondary-btn" style="margin-top: 10px; border-color: #555; color: #aaa; font-size: 0.7rem;" onclick="logout()">LOGOUT</button>
        </div>
    </div>

    <script src="app-storm.js"></script>
</body>
</html>
